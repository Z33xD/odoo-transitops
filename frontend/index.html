<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps - Corporate Login</title>
    <meta name="description" content="Secure portal to access the TransitOps Transport Operations Board.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- --- Authentication Overlay Container --- -->
    <div id="auth-overlay">
        <div class="auth-container glass-panel">
            <div class="auth-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13" rx="2" ry="2"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
            </div>
            <h1 class="auth-title">TransitOps</h1>
            <p class="auth-subtitle">Secure Transport Management Gateway</p>
            
            <form id="auth-form" class="auth-form">
                <div class="form-group">
                    <label for="auth-email">Corporate Email</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="auth-email" class="input-control" placeholder="name@transitops.com" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="auth-password" class="input-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" id="auth-submit-btn" class="auth-btn">Sign In</button>
            </form>

            <div class="demo-credentials">
                <p>Click credentials below to quick-fill:</p>
                <code onclick="quickFill('manager@transitops.com')">Fleet Manager</code>
                <code onclick="quickFill('driver@transitops.com')">Driver</code>
                <code onclick="quickFill('safety@transitops.com')">Safety Officer</code>
                <code onclick="quickFill('finance@transitops.com')">Financial Analyst</code>
            </div>
        </div>
    </div>

    <!-- UI Notification System -->
    <div id="toast-container"></div>

    <!-- Scripts Injection -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        window.quickFill = function(email) {
            document.getElementById('auth-email').value = email;
            document.getElementById('auth-password').value = 'password';
            showToast('Credentials filled. Click Sign In.', 'info');
        };

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const password = document.getElementById('auth-password').value;

            if (!password) {
                showToast('Password is required', 'danger');
                return;
            }

            window.TransitOpsAPI.authenticate(email, password)
                .then(user => {
                    const sessionData = {
                        name: user.name,
                        role: user.role,
                        driverId: user.driverId || null
                    };
                    localStorage.setItem('transitops_session', JSON.stringify(sessionData));
                    showToast(`Authenticating. Redirecting as ${user.role}...`, 'success');

                    setTimeout(() => {
                        switch (user.role) {
                            case 'Fleet Manager':
                                window.location.href = 'dashboards/fleet-manager.html';
                                break;
                            case 'Driver':
                                window.location.href = 'dashboards/driver.html';
                                break;
                            case 'Safety Officer':
                                window.location.href = 'dashboards/safety-officer.html';
                                break;
                            case 'Financial Analyst':
                                window.location.href = 'dashboards/financial-analyst.html';
                                break;
                        }
                    }, 800);
                })
                .catch(err => {
                    showToast(err.message, 'danger');
                });
        });

        // Direct session bypass if user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const sessionStr = localStorage.getItem('transitops_session');
            if (sessionStr) {
                const session = JSON.parse(sessionStr);
                showToast(`Session found. Resuming dashboard for ${session.name}...`, 'info');
                setTimeout(() => {
                    switch (session.role) {
                        case 'Fleet Manager':
                            window.location.href = 'dashboards/fleet-manager.html';
                            break;
                        case 'Driver':
                            window.location.href = 'dashboards/driver.html';
                            break;
                        case 'Safety Officer':
                            window.location.href = 'dashboards/safety-officer.html';
                            break;
                        case 'Financial Analyst':
                            window.location.href = 'dashboards/financial-analyst.html';
                            break;
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
