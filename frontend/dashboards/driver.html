<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps - Driver Route Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- --- Persistent Navbar --- -->
    <header id="persistent-navbar" class="glass-panel">
        <div class="nav-brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="15" height="13" rx="2" ry="2"></rect>
                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg>
            <span>TransitOps</span>
        </div>
        <div class="nav-actions">
            <div id="user-role-badge" class="role-badge">Driver: Loading...</div>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light and dark mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <button id="logout-button" class="logout-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <!-- --- Workspace View Container --- -->
    <main id="workspace-container">
        <section id="view-driver" class="workspace-view">
            <div class="workspace-header">
                <div class="workspace-title">
                    <h2>Driver Dispatch Portal</h2>
                    <p id="driver-welcome-subtitle">Plan dispatches, select vehicles/drivers and track manifests</p>
                </div>
            </div>

            <!-- Content Grid -->
            <div class="dashboard-grid">
                <!-- Dispatch Form Panel -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <h3 class="panel-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            Plan New Dispatch
                        </h3>
                    </div>
                    <div class="panel-body">
                        <form id="dispatch-form" class="panel-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="dispatch-vehicle">Vehicle (Capacity)</label>
                                    <select id="dispatch-vehicle" class="input-control" style="padding-left: 14px;" required>
                                        <option value="">Select vehicle...</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="dispatch-driver">Driver (Status)</label>
                                    <select id="dispatch-driver" class="input-control" style="padding-left: 14px;" required>
                                        <option value="">Select driver...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="dispatch-source">Source</label>
                                    <input type="text" id="dispatch-source" class="input-control" style="padding-left: 14px;" placeholder="City A" required>
                                </div>
                                <div class="form-group">
                                    <label for="dispatch-destination">Destination</label>
                                    <input type="text" id="dispatch-destination" class="input-control" style="padding-left: 14px;" placeholder="City B" required>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 24px;">
                                <label for="dispatch-weight">Cargo Weight (lbs)</label>
                                <input type="number" id="dispatch-weight" class="input-control" style="padding-left: 14px;" placeholder="e.g. 15000" min="1" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                Dispatch Route
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Trips Registry -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <h3 class="panel-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                                <line x1="9" y1="3" x2="9" y2="18"></line>
                                <line x1="15" y1="6" x2="15" y2="21"></line>
                            </svg>
                            Trips Registry
                        </h3>
                    </div>
                    <div class="panel-body data-table-wrapper" style="padding: 0; max-height: 280px; overflow-y: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Route</th>
                                    <th>Cargo</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="fleet-trips-table-body">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Driver Job Management -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <h3 class="panel-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                            Your Assigned Trip
                        </h3>
                    </div>
                    <div class="panel-body" id="driver-trip-container">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Simulation Visual Board -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <h3 class="panel-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                            </svg>
                            Transit Route Monitor
                        </h3>
                    </div>
                    <div class="panel-body">
                        <div class="map-simulator">
                            <div class="map-route-line"></div>
                            <div class="map-dot origin"></div>
                            <div class="map-dot destination"></div>
                            <div style="position: absolute; bottom: 12px; font-size: 0.8rem; background: var(--bg-surface-solid); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border-color);">
                                GPS Live Sync Activated
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- UI Notification System -->
    <div id="toast-container"></div>

    <!-- Scripts Injection -->
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = window.checkSession('Driver');
            if (session) {
                renderDashboard(session);
                setupFormListener();
            }
        });

        function renderDashboard(session) {
            document.getElementById('driver-welcome-subtitle').innerText = `Welcome, ${session.name} | Active Driver & Dispatcher`;

            // Populate Dropdowns
            window.TransitOpsAPI.getVehicles().then(vehicles => {
                const vehicleSelect = document.getElementById('dispatch-vehicle');
                vehicleSelect.innerHTML = '<option value="">Select vehicle...</option>';
                vehicles.forEach(v => {
                    if (v.status !== 'In Shop' && v.status !== 'Retired') {
                        const isAssigned = v.status === 'On Trip';
                        vehicleSelect.innerHTML += `
                            <option value="${v.id}" ${isAssigned ? 'disabled' : ''}>
                                ${v.registration_number} - ${v.name_model} (${v.max_load_capacity.toLocaleString()} lbs) [${v.status}]
                            </option>`;
                    }
                });
            });

            window.TransitOpsAPI.getDrivers().then(drivers => {
                const driverSelect = document.getElementById('dispatch-driver');
                driverSelect.innerHTML = '<option value="">Select driver...</option>';
                drivers.forEach(d => {
                    if (d.status !== 'Suspended' && d.status !== 'Off Duty') {
                        const isAssigned = d.status === 'On Trip';
                        driverSelect.innerHTML += `
                            <option value="${d.id}" ${isAssigned ? 'disabled' : ''}>
                                ${d.name} (Score: ${d.safety_score}) [${d.status}]
                            </option>`;
                    }
                });
            });

            // Populate Trips Registry
            window.TransitOpsAPI.getTrips().then(trips => {
                const tripsTableBody = document.getElementById('fleet-trips-table-body');
                tripsTableBody.innerHTML = '';
                const sortedTrips = [...trips].reverse();
                sortedTrips.forEach(t => {
                    tripsTableBody.innerHTML += `
                        <tr>
                            <td>
                                <div style="font-weight:600; font-size:0.85rem; color:var(--text-primary);">${t.source} → ${t.destination}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted);">Trip ID: #${t.id}</div>
                            </td>
                            <td style="font-size:0.85rem;">${t.cargo_weight.toLocaleString()} lbs</td>
                            <td>${window.getStatusPillHTML(t.status)}</td>
                        </tr>`;
                });

                // Render Assigned Trip for this Driver (Alex Kumar - id: 1)
                const activeTrip = trips.find(t => t.driver_id === session.driverId && (t.status === 'Dispatched' || t.status === 'Draft'));
                const tripContainer = document.getElementById('driver-trip-container');

                if (activeTrip) {
                    window.TransitOpsAPI.getVehicles().then(vehicles => {
                        const vehicle = vehicles.find(v => v.id === activeTrip.vehicle_id);
                        tripContainer.innerHTML = `
                            <div style="display: flex; flex-direction: column; gap: 16px;">
                                <div style="padding: 16px; border-radius: var(--border-radius-sm); background: var(--primary-light); border: 1px solid var(--border-color);">
                                    <div style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px;">Route Assignment</div>
                                    <div style="font-size: 1.4rem; font-weight: 800; font-family: var(--font-heading);">${activeTrip.source} &rarr; ${activeTrip.destination}</div>
                                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">Trip Tracker Reference: #${activeTrip.id}</div>
                                </div>
                                <div class="stats-bar" style="grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0;">
                                    <div class="stat-card" style="padding: 12px;">
                                        <span class="stat-label" style="font-size: 0.75rem;">Vehicle Assigned</span>
                                        <span style="font-size: 1.1rem; font-weight: 700;">${vehicle?.registration_number || 'N/A'}</span>
                                        <span class="stat-desc" style="font-size: 0.7rem;">${vehicle?.name_model || ''}</span>
                                    </div>
                                    <div class="stat-card" style="padding: 12px;">
                                        <span class="stat-label" style="font-size: 0.75rem;">Load Weight</span>
                                        <span style="font-size: 1.1rem; font-weight: 700;">${activeTrip.cargo_weight.toLocaleString()} lbs</span>
                                        <span class="stat-desc" style="font-size: 0.7rem;">Limit: ${vehicle?.max_load_capacity.toLocaleString() || 0} lbs</span>
                                    </div>
                                </div>
                                <div style="display: flex; align-items: center; justify-content: space-between; padding-top: 8px;">
                                    <div>
                                        <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);">Trip Status:</span>
                                        ${window.getStatusPillHTML(activeTrip.status)}
                                    </div>
                                    <div>
                                        <button id="driver-complete-btn" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">
                                            Mark Completed
                                        </button>
                                    </div>
                                </div>
                            </div>`;

                        document.getElementById('driver-complete-btn').addEventListener('click', () => {
                            window.TransitOpsAPI.completeTrip(activeTrip.id).then(() => {
                                showToast(`Trip #${activeTrip.id} successfully completed!`, 'success');
                                renderDashboard(session);
                            });
                        });
                    });
                } else {
                    tripContainer.innerHTML = `
                        <div style="text-align: center; padding: 40px 20px;">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <h4 style="font-weight: 600; margin-bottom: 4px;">No Assigned Trips</h4>
                            <p style="color: var(--text-secondary); font-size: 0.85rem;">Your queue is currently empty. Contact operations for a new route assignment.</p>
                        </div>`;
                }
            });
        }

        function setupFormListener() {
            const form = document.getElementById('dispatch-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const vehicleId = parseInt(document.getElementById('dispatch-vehicle').value);
                const driverId = parseInt(document.getElementById('dispatch-driver').value);
                const source = document.getElementById('dispatch-source').value.trim();
                const destination = document.getElementById('dispatch-destination').value.trim();
                const weight = parseInt(document.getElementById('dispatch-weight').value);

                window.TransitOpsAPI.dispatchTrip(source, destination, vehicleId, driverId, weight)
                    .then(trip => {
                        showToast(`Route #${trip.id} successfully dispatched!`, 'success');
                        form.reset();
                        const session = JSON.parse(localStorage.getItem('transitops_session'));
                        renderDashboard(session);
                    })
                    .catch(err => {
                        showToast(err.message, 'danger');
                    });
            });
        }
    </script>
</body>
</html>
